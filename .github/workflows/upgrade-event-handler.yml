name: Upgrade Event Handler

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version to install (empty for latest stable)'
        required: false
        default: ''

concurrency:
  group: event-handler-deploy
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Upgrade thepopebot
        env:
          TARGET_VERSION: ${{ github.event.inputs.version }}
        run: |
          docker exec -e TARGET_VERSION="${TARGET_VERSION}" thepopebot-event-handler bash -lc '
            set -euo pipefail
            git config --global --add safe.directory /project

            TOKEN="${GH_TOKEN:-}"
            if [ -z "$TOKEN" ] && [ -f /project/.env ]; then
              TOKEN=$(grep "^GH_TOKEN=" /project/.env | cut -d= -f2- || true)
            fi
            if [ -z "$TOKEN" ]; then
              echo "GH_TOKEN is not available inside the event-handler container" >&2
              exit 1
            fi

            OWNER="${GH_OWNER:-}"
            REPO="${GH_REPO:-}"
            if [ -z "$OWNER" ] || [ -z "$REPO" ]; then
              REMOTE=$(git -C /project remote get-url origin)
              OWNER_REPO=$(printf "%s" "$REMOTE" | sed -E "s#^git@github.com:##; s#^https://github.com/##; s#^https://[^@]+@github.com/##; s#\\.git$##")
            else
              OWNER_REPO="$OWNER/$REPO"
            fi

            WORK_DIR=$(mktemp -d)
            trap "rm -rf \"$WORK_DIR\"" EXIT
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${OWNER_REPO}.git" "$WORK_DIR"
            cd "$WORK_DIR/web"

            git config --global user.name "thepopebot"
            git config --global user.email "thepopebot@users.noreply.github.com"

            npm install
            OLD_VERSION=$(node -p "require(\"./node_modules/thepopebot/package.json\").version")

            TARGET="${TARGET_VERSION:-}"
            if [ -n "$TARGET" ]; then
              npm install "thepopebot@${TARGET}" --prefer-online
            else
              npm update thepopebot --prefer-online
            fi

            NEW_VERSION=$(node -p "require(\"./node_modules/thepopebot/package.json\").version")

            if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
              cd "$WORK_DIR"
              git add -A web/package.json web/package-lock.json package-lock.json package.json
              git commit -m "chore: upgrade thepopebot to $NEW_VERSION"
              git push origin HEAD:main
            else
              echo "No changes - thepopebot is already up to date."
            fi
          '
